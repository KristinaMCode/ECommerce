name: Run Selenium Tests
on:
    push:
      branches: [ main, feature/* ]
    pull_request:
      branches: [ main ]
Just jobs:
    test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Set up Java 17
          uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Install Chrome
          uses: browser-actions/setup-chrome@v1

        - name: Run tests
          run: mvn test -B