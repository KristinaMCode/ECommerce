
# Browser and driver lets you switch browsers in future (e.g., chrome, firefox).
browser=chrome

# Application URLs app.url ? the URL your
# test should open. Use this in the Given step
# that opens the login page.
#expected.url ? the URL you expect after navigation
# (useful if your app redirects). For simple cases
# you can use the same value as app.url.
app.url=https://www.saucedemo.com/
expected.url=https://www.saucedemo.com/

# Test user credentials
username=standard_user
password=secret_sauce

# Timeouts (seconds)
implicit.wait=5